<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script src="https://unpkg.com/vue@3"></script>
  
    <style>

      .text-red{
        color: red;
    
      }
      .text-green{
        color: green;
    
      }

    </style>

  </head>
  <body>
    <div id="app">

      
      <!-- <button type="button" :class="buttonClasses" v-on:click="toggle">Click me</button> -->
      <!-- <button type="button" :class="active ? 'text-red' : 'text-green'" v-on:click="toggle">Click me</button> -->
      <!-- <button type="button" :class="active ? 'text-red' : 'text-green'" :onclick="toggle">Click me</button> -->
      <button type="button" :class="active ? 'text-red' : 'text-green'" @click="toggle">Click me</button>

    </div>

    <script>
      Vue.createApp({
        data() {

            // return{
            //   buttonClasses:'text-green'
            // };
            return{
              active:false
            };
        },

        methods:{
          toggle(){
            this.active = ! this.active
          }
        }

      }).mount("#app");
    </script>
  </body>
</html>
