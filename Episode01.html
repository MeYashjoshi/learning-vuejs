<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>

  <script src="https://unpkg.com/vue@3"></script>
</head>

<body>
  <div id="app">

    <p>
      <input type="text" v-model.lazy="greeting" placeholder="v-model.lazy">
      <input type="text" v-model.number="greeting" placeholder="v-model.number">
      <input type="text" v-model.trim="greeting" placeholder="v-model.trim">
    </p>

    {{ greeting }}
    {{ greeting.length}}
    {{ typeof greeting }}

  </div>

  <script>
    Vue.createApp({
      data() {

        return {
          greeting: 'Hello World!'
        };
      },

      mounted() {

        setTimeout(() => {

          this.greeting = 'Hello India!'

        }, 3000);

      }

    }).mount("#app");
  </script>
</body>

</html>
